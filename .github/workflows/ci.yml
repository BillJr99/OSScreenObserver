name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wmctrl
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check . --exclude tests
      - name: Module size guard (design doc ~600 LOC cap)
        run: python scripts/check_module_size.py
      - name: Type-check with mypy
        run: mypy .
      - name: Run regression tests (with coverage floor)
        # Coverage floor: measured 56% source coverage on this lane
        # (tests/ omitted via pyproject [tool.coverage.run]); floor set
        # 3 points below so incidental drift doesn't break CI while real
        # regressions in test breadth do.
        run: pytest tests/ -q -m "not user" --ignore=tests/user --cov --cov-fail-under=53

      - name: Run user tests (when display + tesseract present)
        run: pytest tests/user/ -q -m "user and not slow_llm and not slow_vlm and not needs_display"
