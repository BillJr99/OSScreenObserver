[pytest]
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
markers =
    user: end-to-end user-facing tests that boot a real `python main.py` subprocess and drive it via REST or MCP stdio. Skipped on the default CI lane via -m "not user".
    slow_llm: tests that hit a real chat LLM via the VLM endpoint.
    slow_vlm: tests that hit a real vision LLM (Ollama qwen2.5vl, etc.).
    needs_display: tests that require a real X11 display (DISPLAY env var must point at an X server).
    needs_tesseract: tests that require the Tesseract binary to be installed (used by /api/ocr).
